version: 1
build:
  main: cmd/monod
  binary: monod
validation: sovereign
genesis:
  app_name: mono
  chain_id: mono
  app_state:
    mono:
      params:
        fee_burn_percent: "0.9"
        validator_registration_fee:
          denom: alyth
          amount: "100000000000000000000000"
default_denom: alyth
accounts: 
- name: alice
  coins:
  - 200000000alyth
  cointype: 60
- name: bob
  coins:
  - 100000000alyth
  cointype: 60
client:
  openapi:
    path: docs/static/openapi.json
faucet:
  name: bob
  coins:
  - 100000alyth
validators:
- name: alice
  home: ~/.mono
  bonded: 100000000alyth
- name: validator1
  home: ~/.mono
  bonded: 200000000alyth
- name: validator2
  home: ~/.mono
  bonded: 100000000alyth
